<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Foyer-Umbau – Übersicht</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="header">
  <img src="assets/dots-light.svg" class="header-dots" alt="">
  <img src="assets/up-light.svg" class="header-arrows" alt="">
  <h1>Übersicht</h1>
  <p>Foyer-Umbau Christusgemeinde · Juli 2026</p>
  <div class="header-meta">
    <div class="header-stat" id="stat-done"><strong>0</strong>Erledigt</div>
    <div class="header-stat" id="stat-helpers"><strong>0</strong>Helfer</div>
  </div>
</div>

<div class="page-nav">
  <a href="index.html">← Helfer-Seite</a>
</div>

<div class="main">
  <div class="progress-wrap">
    <div class="progress-label">
      <span>Gesamtfortschritt</span>
      <span id="progress-text">0 / 0 Aufgaben</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
    </div>
  </div>

  <div class="section-title">Tagesübersicht</div>
  <div id="days-container"><div class="loading">Lädt…</div></div>

  <div class="section-title" style="margin-top:8px">Alle Helfer</div>
  <div id="helpers-container"><div class="loading">Lädt…</div></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="js/config.js"></script>
<script>
firebase.initializeApp(CONFIG.firebase);
const db = firebase.database();
let allTasks = {}, allHelpers = {};

db.ref("tasks").on("value",   snap => { allTasks   = snap.val() || {}; render(); });
db.ref("helpers").on("value", snap => { allHelpers = snap.val() || {}; render(); });

function render() {
  const tasks   = Object.values(allTasks);
  const helpers = Object.values(allHelpers);
  const done    = tasks.filter(t => t.done).length;

  document.getElementById("stat-done").innerHTML    = `<strong>${done}</strong>Erledigt`;
  document.getElementById("stat-helpers").innerHTML = `<strong>${helpers.length}</strong>Helfer`;
  document.getElementById("progress-text").textContent = `${done} / ${tasks.length} Aufgaben`;
  document.getElementById("progress-bar").style.width  = tasks.length ? `${(done / tasks.length * 100).toFixed(0)}%` : "0%";

  const days = {};
  tasks.forEach(t => {
    if (!days[t.dayNumber]) days[t.dayNumber] = { label: t.dayLabel, subtitle: t.daySubtitle, tasks: [] };
    days[t.dayNumber].tasks.push(t);
  });

  const helpersByTask = {};
  helpers.forEach(h => { helpersByTask[h.taskId] = (helpersByTask[h.taskId] || 0) + 1; });

  let daysHtml = "";
  Object.keys(days).sort((a, b) => Number(a) - Number(b)).forEach(k => {
    const { label, tasks: dayTasks } = days[k];
    const doneTasks    = dayTasks.filter(t => t.done).length;
    const totalHelpers = dayTasks.reduce((s, t) => s + (helpersByTask[t.id] || 0), 0);
    const maxHelpers   = dayTasks.reduce((s, t) => s + (t.neededPersons || 0), 0);
    const allDone      = doneTasks === dayTasks.length;
    const bars = Array.from({ length: Math.min(maxHelpers, 12) }, (_, i) =>
      `<div class="dash-bar ${i < totalHelpers ? "filled" : ""}"></div>`
    ).join("");

    daysHtml += `<div class="dash-day-row">
      <div class="day-dot ${allDone ? "dot-done" : totalHelpers > 0 ? "dot-active" : "dot-open"}"></div>
      <div class="dash-day-info">
        <div class="dash-day-title">${label}</div>
        <div class="dash-day-tasks">${doneTasks}/${dayTasks.length} Aufgaben · ${totalHelpers} Helfer eingetragen</div>
      </div>
      <div class="dash-bars">${bars}</div>
    </div>`;
  });
  document.getElementById("days-container").innerHTML = daysHtml || '<div class="empty-state">Keine Daten</div>';

  const sorted = helpers.sort((a, b) => (a.date || "").localeCompare(b.date || ""));
  document.getElementById("helpers-container").innerHTML = sorted.length
    ? sorted.map(h => {
        const timeStr    = h.from ? ` · ${h.from}${h.to ? "–" + h.to : " Uhr"}` : "";
        const toolsHtml  = h.tools?.length ? `<div class="helper-tools">Werkzeug: ${h.tools.join(", ")}</div>` : "";
        const commentHtml = h.comment ? `<div class="helper-comment">"${h.comment}"</div>` : "";
        return `<div class="helper-list-item">
          <div class="helper-name">${h.name}</div>
          <div class="helper-detail">${h.dayLabel} · ${h.taskTitle}${timeStr}</div>
          ${toolsHtml}${commentHtml}
        </div>`;
      }).join("")
    : '<div class="empty-state">Noch keine Helfer eingetragen</div>';
}
</script>
</body>
</html>
