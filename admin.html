<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Foyer-Umbau – Admin</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="header">
  <img src="assets/dots-light.svg" class="header-dots" alt="">
  <h1>Admin</h1>
  <p>Aufgaben verwalten · Helfer einsehen</p>
</div>

<div class="page-nav">
  <a href="index.html">← Helfer-Seite</a>
</div>

<div id="auth-screen" class="auth-screen">
  <h2>Admin-Zugang</h2>
  <p>Bitte gib den Admin-Code ein.</p>
  <input class="form-input" type="password" id="key-input" placeholder="Admin-Code" style="text-align:center;font-size:1.1rem;letter-spacing:.12em">
  <p class="auth-error hidden" id="auth-error">Falscher Code.</p>
  <button class="btn-primary" style="width:100%;margin-top:12px" onclick="checkKey()">Weiter</button>
</div>

<div id="admin-content" class="hidden">

  <!-- Tile Navigation -->
  <div class="admin-tiles">
    <button class="admin-tile active" onclick="showSection('aufgaben')" id="tile-aufgaben">📋 Aufgaben</button>
    <button class="admin-tile" onclick="showSection('helfer')" id="tile-helfer">👥 Helfer nach Tag</button>
    <button class="admin-tile" onclick="showSection('kalender')" id="tile-kalender">📅 Helfer-Kalender</button>
  </div>

  <!-- Aufgaben -->
  <div id="section-aufgaben" class="main">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:4px 0 0">
      <div class="section-title" style="padding:0">Aufgaben</div>
      <button class="btn-export" onclick="exportCSV()">Export CSV</button>
    </div>
    <div class="filter-chips" id="day-filter"></div>
    <button class="btn-add-task" onclick="openTaskForm(null)">+ Neue Aufgabe hinzufügen</button>
    <div id="tasks-container"></div>
  </div>

  <!-- Helfer nach Tag -->
  <div id="section-helfer" class="main hidden">
    <div class="section-title" style="padding-top:4px">Helfer nach Tag</div>
    <div id="helpers-by-day-container"></div>
  </div>

  <!-- Helfer-Kalender -->
  <div id="section-kalender" class="main hidden">
    <div class="section-title" style="padding-top:4px">Helfer-Kalender</div>
    <div style="display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap">
      <span style="display:flex;align-items:center;gap:5px;font-size:.75rem;color:var(--text-muted)"><span style="width:14px;height:14px;border-radius:3px;background:#fde235;display:inline-block"></span>Jeder willkommen</span>
      <span style="display:flex;align-items:center;gap:5px;font-size:.75rem;color:var(--text-muted)"><span style="width:14px;height:14px;border-radius:3px;background:#4aada9;display:inline-block"></span>Handwerklich</span>
      <span style="display:flex;align-items:center;gap:5px;font-size:.75rem;color:var(--text-muted)"><span style="width:14px;height:14px;border-radius:3px;background:#4a7fd4;display:inline-block"></span>Fachkenntnisse</span>
    </div>
    <div id="kalender-container"></div>
  </div>

</div>

<!-- Task modal -->
<div class="modal-overlay hidden" id="task-modal-overlay">
  <div class="modal"><div class="modal-handle"></div><div id="task-modal-body"></div></div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
<script src="js/config.js"></script>
<script src="js/seed-data.js"></script>
<script>
firebase.initializeApp(CONFIG.firebase);
const db = firebase.database();
let allTasks = {}, allHelpers = {}, filterDay = null;

// ── Auth ──────────────────────────────────────────────────────────────────────
const urlKey = new URLSearchParams(location.search).get("key");
if (urlKey === CONFIG.adminKey) authorize();

function checkKey() {
  if (document.getElementById("key-input").value.trim() === CONFIG.adminKey) authorize();
  else {
    document.getElementById("auth-error").classList.remove("hidden");
    document.getElementById("key-input").value = "";
  }
}
document.getElementById("key-input").addEventListener("keydown", e => { if (e.key === "Enter") checkKey(); });

function authorize() {
  document.getElementById("auth-screen").classList.add("hidden");
  document.getElementById("admin-content").classList.remove("hidden");
  db.ref("tasks").on("value",   snap => { allTasks   = snap.val() || {}; renderTasks(); renderHelpersByDay(); renderKalender(); });
  db.ref("helpers").on("value", snap => { allHelpers = snap.val() || {}; renderTasks(); renderHelpersByDay(); renderKalender(); });
}

// ── Tile Navigation ───────────────────────────────────────────────────────────
function showSection(name) {
  ["aufgaben","helfer","kalender"].forEach(s => {
    document.getElementById(`section-${s}`).classList.toggle("hidden", s !== name);
    document.getElementById(`tile-${s}`).classList.toggle("active", s === name);
  });
}

// ── Tasks ─────────────────────────────────────────────────────────────────────
function buildFilter() {
  const days = {};
  Object.values(allTasks).forEach(t => { days[t.dayNumber] = t.dayLabel; });
  let html = `<button class="chip ${filterDay === null ? "active" : ""}" onclick="setFilter(null)">Alle</button>`;
  Object.keys(days).sort((a,b)=>Number(a)-Number(b)).forEach(k => {
    html += `<button class="chip ${filterDay === Number(k) ? "active" : ""}" onclick="setFilter(${k})">Tag ${k}</button>`;
  });
  document.getElementById("day-filter").innerHTML = html;
}
function setFilter(day) { filterDay = day; renderTasks(); buildFilter(); }

let dragId = null;

function renderTasks() {
  buildFilter();
  const tasks = Object.values(allTasks)
    .filter(t => filterDay === null || t.dayNumber === filterDay)
    .sort((a, b) => a.dayNumber - b.dayNumber || (a.order || 0) - (b.order || 0));

  const helpersByDay = {};
  Object.values(allHelpers).forEach(h => { helpersByDay[h.dayNumber] = (helpersByDay[h.dayNumber] || 0) + 1; });

  const SKILL = { jeder: "✋ Jeder", handwerklich: "🔧 Handwerklich", fachkenntnisse: "⚡ Fachkenntnisse" };
  let lastDay = null, html = "";

  tasks.forEach(t => {
    if (t.dayLabel !== lastDay) {
      const hCount = helpersByDay[t.dayNumber] || 0;
      html += `<div class="section-title" style="padding-top:12px">${t.dayLabel} <span style="font-weight:400;color:var(--text-muted)">· ${t.daySubtitle} · ${hCount} Helfer</span></div>`;
      lastDay = t.dayLabel;
    }
    html += `<div class="admin-task-row ${t.done ? "done-task" : ""}" draggable="true" data-id="${t.id}" data-day="${t.dayNumber}"
      ondragstart="onDragStart(event)" ondragover="onDragOver(event)" ondrop="onDrop(event)" ondragend="onDragEnd(event)">
      <span style="cursor:grab;color:var(--text-muted);font-size:1rem;padding-right:4px;touch-action:none">⠿</span>
      <input type="checkbox" class="admin-task-check" ${t.done ? "checked" : ""} onchange="toggleDone('${t.id}', this.checked)">
      <div class="admin-task-info">
        <div class="admin-task-title">${t.title}</div>
        <div class="admin-task-sub">${SKILL[t.skillLevel]} · ${t.neededPersons ?? "?"}p ·
          <span class="quick-hours" title="Gesamtzeit bearbeiten" onclick="editHours('${t.id}', ${(t.estimatedHours||0)*(t.neededPersons||1)}, ${t.neededPersons||1})">~${Math.round((t.estimatedHours||0)*(t.neededPersons||1))}h gesamt ✎</span>
        </div>
        ${t.notes ? `<div class="admin-task-sub" style="color:var(--teal-dark)">${t.notes}</div>` : ""}
      </div>
      <button class="btn-edit" onclick="openTaskForm('${t.id}')">Bearbeiten</button>
      <button class="btn-delete" onclick="deleteTask('${t.id}')">✕</button>
    </div>`;
  });
  document.getElementById("tasks-container").innerHTML = html || '<div class="empty-state">Keine Aufgaben</div>';
}

function toggleDone(id, val) { db.ref(`tasks/${id}/done`).set(val); }

async function deleteTask(id) {
  if (!confirm("Aufgabe wirklich löschen?")) return;
  await db.ref(`tasks/${id}`).remove();
}

function editHours(id, totalCurrent, persons) {
  const val = prompt(`Gesamtzeit für die Aufgabe (Stunden gesamt, ${persons} Personen):`, totalCurrent);
  if (val === null) return;
  const total = parseFloat(val);
  if (!isNaN(total) && total >= 0) db.ref(`tasks/${id}/estimatedHours`).set(Math.round(total / persons * 10) / 10);
}

// ── Drag & Drop ───────────────────────────────────────────────────────────────
function onDragStart(e) {
  dragId = e.currentTarget.dataset.id;
  e.currentTarget.style.opacity = "0.4";
}
function onDragEnd(e) {
  e.currentTarget.style.opacity = "";
  document.querySelectorAll(".admin-task-row").forEach(r => r.classList.remove("drag-over"));
}
function onDragOver(e) {
  e.preventDefault();
  document.querySelectorAll(".admin-task-row").forEach(r => r.classList.remove("drag-over"));
  e.currentTarget.classList.add("drag-over");
}
function onDrop(e) {
  e.preventDefault();
  const targetId = e.currentTarget.dataset.id;
  if (!dragId || dragId === targetId) return;
  const dragDay  = allTasks[dragId]?.dayNumber;
  const dropDay  = allTasks[targetId]?.dayNumber;
  if (dragDay !== dropDay) return; // nur innerhalb des gleichen Tages

  const dayTasks = Object.values(allTasks)
    .filter(t => t.dayNumber === dragDay)
    .sort((a,b) => (a.order||0)-(b.order||0));

  const fromIdx = dayTasks.findIndex(t => t.id === dragId);
  const toIdx   = dayTasks.findIndex(t => t.id === targetId);
  dayTasks.splice(toIdx, 0, dayTasks.splice(fromIdx, 1)[0]);

  const updates = {};
  dayTasks.forEach((t, i) => { updates[`${t.id}/order`] = i; });
  db.ref("tasks").update(updates);
}

// ── Helfer nach Tag ───────────────────────────────────────────────────────────
function renderHelpersByDay() {
  const days = {};
  Object.values(allTasks).forEach(t => {
    if (!days[t.dayNumber]) days[t.dayNumber] = { label: t.dayLabel, subtitle: t.daySubtitle, helpers: [] };
  });
  Object.entries(allHelpers).forEach(([id, h]) => {
    if (days[h.dayNumber]) days[h.dayNumber].helpers.push({ id, ...h });
  });

  let html = "";
  Object.keys(days).sort((a,b)=>Number(a)-Number(b)).forEach(k => {
    const d = days[k];
    html += `<div class="section-title" style="padding-top:12px">${d.label} <span style="font-weight:400;color:var(--text-muted)">· ${d.subtitle}</span></div>`;
    if (!d.helpers.length) {
      html += `<div style="font-size:0.82rem;color:var(--text-muted);padding:8px 0 4px">Noch keine Helfer</div>`;
    } else {
      d.helpers.sort((a,b) => (a.timeFrom||"").localeCompare(b.timeFrom||"")).forEach(h => {
        const timeStr   = h.timeFrom ? ` · ${h.timeFrom}${h.timeTo ? "–"+h.timeTo : ""}` : "";
        const emailStr  = h.email ? `<span style="color:var(--text-muted)"> · ${h.email}</span>` : "";
        const toolsStr  = h.tools?.length ? `<div class="admin-task-sub">🔧 ${h.tools.join(", ")}</div>` : "";
        const commentStr= h.comment ? `<div class="admin-task-sub" style="color:var(--teal-dark)">"${h.comment}"</div>` : "";
        const skillColors = { jeder:"#fffbe6", handwerklich:"#e6f6f5", fachkenntnisse:"#e8f0fe" };
        const bg = skillColors[h.skillLevel] || "#f2f0ed";
        html += `<div class="admin-task-row" style="background:${bg}">
          <div class="admin-task-info">
            <div class="admin-task-title">${h.name}${emailStr}</div>
            <div class="admin-task-sub" style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">
              <select onchange="updateHelperSkill('${h.id}',this.value)" style="font-size:.72rem;padding:2px 6px;border:1px solid #d0cdc8;border-radius:6px;background:white;cursor:pointer;font-family:inherit">
                <option value="jeder" ${h.skillLevel==="jeder"?"selected":""}>✋ Jeder</option>
                <option value="handwerklich" ${h.skillLevel==="handwerklich"?"selected":""}>🔧 Handwerklich</option>
                <option value="fachkenntnisse" ${h.skillLevel==="fachkenntnisse"?"selected":""}>⚡ Fachkenntnisse</option>
              </select>
              <span>${timeStr.replace(" · ","")}</span>
            </div>
            ${toolsStr}${commentStr}
          </div>
          <button class="btn-delete" onclick="deleteHelper('${h.id}','${h.name.replace(/'/g,"\\'")}')">✕</button>
        </div>`;
      });
    }
  });
  document.getElementById("helpers-by-day-container").innerHTML = html || '<div class="empty-state">Noch keine Helfer</div>';
}

// ── Helfer-Kalender ───────────────────────────────────────────────────────────
const DAY_START = 8, DAY_END = 22; // 08:00–22:00

function timeToPos(timeStr) {
  if (!timeStr) return null;
  const [h,m] = timeStr.split(":").map(Number);
  return Math.max(0, Math.min(100, ((h + m/60) - DAY_START) / (DAY_END - DAY_START) * 100));
}

function renderKalender() {
  const days = {};
  Object.values(allTasks).forEach(t => {
    if (!days[t.dayNumber]) days[t.dayNumber] = { label: t.dayLabel, subtitle: t.daySubtitle, date: t.date, helpers: [], tasks: [] };
    days[t.dayNumber].tasks.push(t);
  });
  Object.entries(allHelpers).forEach(([id, h]) => {
    if (days[h.dayNumber]) days[h.dayNumber].helpers.push({ id, ...h });
  });

  const hourMarkers = [];
  for (let h = DAY_START; h <= DAY_END; h += 2) {
    const pct = (h - DAY_START) / (DAY_END - DAY_START) * 100;
    hourMarkers.push({ h, pct });
  }

  let html = "";
  Object.keys(days).sort((a,b)=>Number(a)-Number(b)).forEach(k => {
    const d = days[k];
    const sorted = [...d.helpers].sort((a,b)=>(a.timeFrom||"").localeCompare(b.timeFrom||""));
    const noTime = sorted.filter(h => !h.timeFrom);
    const withTime = sorted.filter(h => h.timeFrom);

    const markerHtml = hourMarkers.map(({h,pct}) =>
      `<div style="position:absolute;left:${pct}%;top:0;bottom:0;border-left:1px solid #e3e0da;pointer-events:none">
        <span style="position:absolute;top:-16px;left:2px;font-size:.6rem;color:#b4a493">${h}:00</span>
      </div>`
    ).join("");

    const barsHtml = withTime.map((h, i) => {
      const from = timeToPos(h.timeFrom);
      const to   = h.timeTo ? timeToPos(h.timeTo) : Math.min(100, from + (100/(DAY_END-DAY_START))*4);
      const width = Math.max(1, to - from);
      const skillColor = { jeder:"#fde235", handwerklich:"#4aada9", fachkenntnisse:"#4a7fd4" };
      const color = skillColor[h.skillLevel] || "#b4a493";
      return `<div title="${h.name} · ${h.timeFrom}${h.timeTo?"–"+h.timeTo:""}" style="position:absolute;left:${from}%;width:${width}%;top:${i*22}px;height:18px;background:${color};border-radius:4px;display:flex;align-items:center;padding:0 6px;overflow:hidden">
        <span style="font-size:.65rem;font-weight:700;color:#212222;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${h.name}</span>
      </div>`;
    }).join("");

    const timelineHeight = Math.max(30, withTime.length * 22 + 4);

    html += `<div style="background:white;border-radius:12px;padding:14px 16px;margin-bottom:12px;border:1.5px solid var(--border)">
      <div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px">
        <div>
          <div style="font-weight:700;font-size:.95rem">${d.label}</div>
          <div style="font-size:.72rem;color:var(--text-muted)">${d.subtitle}</div>
        </div>
        <div style="font-size:.75rem;color:var(--text-muted)">${d.helpers.length} Helfer</div>
      </div>
      ${withTime.length ? `
      <div style="position:relative;margin:20px 0 8px;height:${timelineHeight}px">
        ${markerHtml}
        ${barsHtml}
      </div>` : ""}
      ${noTime.length ? `<div style="font-size:.75rem;color:var(--text-muted);margin-top:6px">Ohne Uhrzeit: ${noTime.map(h=>h.name).join(", ")}</div>` : ""}
      ${!d.helpers.length ? `<div style="font-size:.78rem;color:var(--text-muted)">Noch keine Helfer</div>` : ""}
    </div>`;
  });
  document.getElementById("kalender-container").innerHTML = html;
}

async function deleteHelper(id, name) {
  if (!confirm(`Eintrag von "${name}" wirklich löschen?`)) return;
  await db.ref(`helpers/${id}`).remove();
}

function updateHelperSkill(id, skill) {
  db.ref(`helpers/${id}/skillLevel`).set(skill);
}

// ── Task form ─────────────────────────────────────────────────────────────────
function openTaskForm(taskId) {
  const task = taskId ? allTasks[taskId] : null;
  const dayNums = [...new Set(Object.values(allTasks).map(t => t.dayNumber))].sort((a,b)=>a-b);
  const dayOptions = dayNums.map(n => {
    const ref = Object.values(allTasks).find(x => x.dayNumber === n);
    const sel = task?.dayNumber === n ? "selected" : "";
    return `<option value="${n}" data-label="${ref.dayLabel}" data-subtitle="${ref.daySubtitle}" ${sel}>${ref.dayLabel} – ${ref.daySubtitle}</option>`;
  }).join("") + `<option value="new">+ Neuen Tag erstellen…</option>`;

  document.getElementById("task-modal-body").innerHTML = `
    <div class="modal-title">${task ? "Aufgabe bearbeiten" : "Neue Aufgabe"}</div>
    <div style="height:12px"></div>
    <form id="task-form">
      <div class="form-group">
        <label class="form-label">Tag *</label>
        <select class="form-input" id="tf-day" required>${dayOptions}</select>
      </div>
      <div id="new-day-fields" class="hidden">
        <div class="form-group"><label class="form-label">Tag-Nummer</label><input class="form-input" type="number" id="tf-daynum"></div>
        <div class="form-group"><label class="form-label">Tag-Label (z.B. "Tag 14 – Sonntag")</label><input class="form-input" type="text" id="tf-daylabel"></div>
        <div class="form-group"><label class="form-label">Datum</label><input class="form-input" type="date" id="tf-date"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Aufgabe *</label>
        <input class="form-input" type="text" id="tf-title" value="${task?.title || ""}" required>
      </div>
      <div class="form-group">
        <label class="form-label">Skill-Level</label>
        <select class="form-input" id="tf-skill">
          <option value="jeder" ${task?.skillLevel==="jeder"?"selected":""}>✋ Jeder willkommen</option>
          <option value="handwerklich" ${task?.skillLevel==="handwerklich"?"selected":""}>🔧 Handwerklich</option>
          <option value="fachkenntnisse" ${task?.skillLevel==="fachkenntnisse"?"selected":""}>⚡ Fachkenntnisse</option>
        </select>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">
        <div class="form-group"><label class="form-label">Personenbedarf</label><input class="form-input" type="number" id="tf-persons" value="${task?.neededPersons ?? ""}"></div>
        <div class="form-group"><label class="form-label">Geschätzte Stunden</label><input class="form-input" type="number" step="0.5" id="tf-hours" value="${task?.estimatedHours ?? ""}"></div>
      </div>
      <div class="form-group">
        <label class="form-label">Werkzeug (kommagetrennt)</label>
        <input class="form-input" type="text" id="tf-tools" value="${(task?.tools||[]).join(", ")}">
      </div>
      <div class="form-group">
        <label class="form-label">Hinweis / Notiz</label>
        <input class="form-input" type="text" id="tf-notes" value="${task?.notes || ""}">
      </div>
      <div class="modal-actions">
        <button type="button" class="btn-cancel" onclick="closeTaskModal()">Abbrechen</button>
        <button type="submit" class="btn-submit">${task ? "Speichern" : "Erstellen"}</button>
      </div>
    </form>`;

  document.getElementById("tf-day").addEventListener("change", e => {
    document.getElementById("new-day-fields").classList.toggle("hidden", e.target.value !== "new");
  });
  document.getElementById("task-form").addEventListener("submit", e => saveTask(e, taskId));
  document.getElementById("task-modal-overlay").classList.remove("hidden");
}

function closeTaskModal() { document.getElementById("task-modal-overlay").classList.add("hidden"); }
document.getElementById("task-modal-overlay").addEventListener("click", e => {
  if (e.target === document.getElementById("task-modal-overlay")) closeTaskModal();
});

async function saveTask(e, taskId) {
  e.preventDefault();
  const daySelect = document.getElementById("tf-day").value;
  let dayNumber, dayLabel, daySubtitle, date;
  if (daySelect === "new") {
    dayNumber   = Number(document.getElementById("tf-daynum").value);
    dayLabel    = document.getElementById("tf-daylabel").value.trim();
    date        = document.getElementById("tf-date").value;
    const d     = new Date(date);
    daySubtitle = date ? d.toLocaleDateString("de-DE",{day:"2-digit",month:"long",year:"numeric"}) : "";
  } else {
    dayNumber = Number(daySelect);
    const sel = document.getElementById("tf-day");
    const opt = sel.options[sel.selectedIndex];
    dayLabel    = opt.dataset.label;
    daySubtitle = opt.dataset.subtitle;
    date        = Object.values(allTasks).find(t=>t.dayNumber===dayNumber)?.date || "";
  }
  const tools = document.getElementById("tf-tools").value.split(",").map(s=>s.trim()).filter(Boolean);
  const data = {
    dayNumber, dayLabel, daySubtitle, date,
    title:          document.getElementById("tf-title").value.trim(),
    skillLevel:     document.getElementById("tf-skill").value,
    neededPersons:  Number(document.getElementById("tf-persons").value) || null,
    estimatedHours: Number(document.getElementById("tf-hours").value) || null,
    tools, notes: document.getElementById("tf-notes").value.trim(),
    done: taskId ? (allTasks[taskId]?.done || false) : false
  };
  if (taskId) await db.ref(`tasks/${taskId}`).update(data);
  else { const id = `custom-${Date.now()}`; await db.ref(`tasks/${id}`).set({ id, ...data }); }
  closeTaskModal();
}

// ── CSV Export ────────────────────────────────────────────────────────────────
function exportCSV() {
  const helpers = Object.values(allHelpers);
  if (!helpers.length) { alert("Noch keine Helfer eingetragen."); return; }
  const rows = [["Name","Tag","Datum","Von","Bis","E-Mail","Skill","Werkzeug","Kommentar"]];
  helpers.forEach(h => {
    rows.push([h.name,h.dayLabel,h.date,h.timeFrom||"",h.timeTo||"",h.email||"",h.skillLevel||"",(h.tools||[]).join("; "),h.comment||""]);
  });
  const csv = rows.map(r=>r.map(v=>`"${String(v).replace(/"/g,'""')}"`).join(",")).join("\n");
  const a = document.createElement("a");
  a.href = "data:text/csv;charset=utf-8,﻿" + encodeURIComponent(csv);
  a.download = `helfer-export-${new Date().toISOString().split("T")[0]}.csv`;
  a.click();
}
</script>
</body>
</html>
